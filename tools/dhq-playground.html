<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>DHQ Value Playground</title>
  <script src="../shared/dhq-core.js"></script>
  <style>
    :root{--bg:#101114;--panel:#181a20;--panel2:#20232b;--line:#30343d;--text:#f2f2ee;--muted:#a9adba;--gold:#d4af37;--green:#3ddc97;--red:#ff6b6b;--blue:#60a5fa}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:14px}
    .wrap{max-width:1320px;margin:0 auto;padding:18px}
    header{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:14px}
    h1{font-size:22px;line-height:1.1;margin:0;letter-spacing:0;font-weight:800}
    .stamp{font-size:12px;color:var(--muted);font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
    .grid{display:grid;grid-template-columns:360px 1fr;gap:14px;align-items:start}
    .panel{background:var(--panel);border:1px solid var(--line);border-radius:8px}
    .controls{padding:14px;display:flex;flex-direction:column;gap:12px}
    label{display:block;font-size:12px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
    input,select,textarea{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:6px;color:var(--text);font:inherit;padding:9px 10px}
    textarea{min-height:118px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;line-height:1.45;resize:vertical}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .buttons{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    button{border:1px solid var(--line);background:var(--panel2);color:var(--text);border-radius:6px;padding:9px 10px;font-weight:700;cursor:pointer}
    button.primary{border-color:rgba(212,175,55,.45);background:rgba(212,175,55,.12);color:var(--gold)}
    button:hover{border-color:var(--gold)}
    .metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;padding:12px;border-bottom:1px solid var(--line)}
    .metric{background:var(--panel2);border:1px solid var(--line);border-radius:6px;padding:10px}
    .metric span{display:block;color:var(--muted);font-size:12px;margin-bottom:4px}
    .metric strong{font-size:18px}
    .content{padding:12px}
    .toolbar{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px}
    .tabs{display:flex;gap:6px}
    .tabs button{padding:7px 10px;font-size:13px}
    .tabs button.active{background:var(--gold);color:#16140d;border-color:var(--gold)}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th,td{padding:8px 9px;border-bottom:1px solid var(--line);text-align:right;white-space:nowrap}
    th:first-child,td:first-child{text-align:left}
    th{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.04em;background:#15171c;position:sticky;top:0}
    tbody tr:hover{background:rgba(255,255,255,.03)}
    .pos{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;color:var(--gold);font-weight:800}
    .rank{color:var(--muted);font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
    .good{color:var(--green)}
    .bad{color:var(--red)}
    .scroll{max-height:690px;overflow:auto;border:1px solid var(--line);border-radius:6px}
    details{border-top:1px solid var(--line);padding-top:10px}
    summary{cursor:pointer;color:var(--muted);font-weight:700}
    .error{display:none;color:var(--red);background:rgba(255,107,107,.08);border:1px solid rgba(255,107,107,.22);border-radius:6px;padding:9px 10px}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.metrics{grid-template-columns:repeat(2,minmax(0,1fr))}}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>DHQ Value Playground</h1>
      <div class="stamp" id="stamp">standalone core</div>
    </header>

    <div class="grid">
      <aside class="panel controls">
        <div class="row">
          <div>
            <label for="mode">Mode</label>
            <select id="mode">
              <option value="dynasty">Dynasty</option>
              <option value="redraft">Redraft</option>
            </select>
          </div>
          <div>
            <label for="teams">League Size</label>
            <input id="teams" type="number" min="2" max="32" value="16">
          </div>
        </div>

        <div class="row">
          <div>
            <label for="ppr">PPR</label>
            <select id="ppr">
              <option value="0">0</option>
              <option value="0.5" selected>0.5</option>
              <option value="1">1</option>
            </select>
          </div>
          <div>
            <label for="years">Future Years</label>
            <input id="years" type="number" min="0" max="5" value="2">
          </div>
        </div>

        <div>
          <label for="roster">Roster Slots</label>
          <input id="roster" value="QB,RB,RB,WR,WR,TE,FLEX,SUPER_FLEX,K">
        </div>

        <div>
          <label for="scoring">Scoring JSON</label>
          <textarea id="scoring">{
  "pass_td": 4,
  "pass_yd": 0.04,
  "rush_yd": 0.1,
  "rec": 0.5,
  "rec_yd": 0.1,
  "fgm": 3,
  "xpm": 1
}</textarea>
        </div>

        <div class="buttons">
          <button type="button" onclick="presetSuperflex()">16 Team SF</button>
          <button type="button" onclick="presetRedraft()">Redraft PPR</button>
          <button type="button" onclick="presetKicker()">Kicker Stress</button>
          <button type="button" class="primary" onclick="render()">Run DHQ</button>
        </div>

        <details>
          <summary>Sample Data JSON</summary>
          <label for="dataJson" style="margin-top:10px">Players, stats, marketRows</label>
          <textarea id="dataJson"></textarea>
        </details>

        <div class="error" id="error"></div>
      </aside>

      <main class="panel">
        <section class="metrics">
          <div class="metric"><span>Top Asset</span><strong id="topAsset">-</strong></div>
          <div class="metric"><span>Lineup PPG</span><strong id="lineupPpg">-</strong></div>
          <div class="metric"><span>K Point Share</span><strong id="kShare">-</strong></div>
          <div class="metric"><span>Rows</span><strong id="rowCount">-</strong></div>
        </section>

        <section class="content">
          <div class="toolbar">
            <div class="tabs">
              <button id="tabPlayers" class="active" type="button" onclick="setView('players')">Players</button>
              <button id="tabPicks" type="button" onclick="setView('picks')">Picks</button>
              <button id="tabPositions" type="button" onclick="setView('positions')">Positions</button>
            </div>
            <div class="stamp" id="configOut"></div>
          </div>
          <div class="scroll" id="tableWrap"></div>
        </section>
      </main>
    </div>
  </div>

  <script>
    const sample = {
      players: {
        '4984': { full_name:'Josh Allen', position:'QB', team:'BUF', age:29 },
        '11564': { full_name:'Drake Maye', position:'QB', team:'NE', age:23 },
        '4046': { full_name:'Patrick Mahomes', position:'QB', team:'KC', age:30 },
        '9509': { full_name:'Bijan Robinson', position:'RB', team:'ATL', age:24 },
        '9221': { full_name:'Jahmyr Gibbs', position:'RB', team:'DET', age:24 },
        '9226': { full_name:"De'Von Achane", position:'RB', team:'MIA', age:24 },
        '7564': { full_name:"Ja'Marr Chase", position:'WR', team:'CIN', age:26 },
        '9493': { full_name:'Puka Nacua', position:'WR', team:'LAR', age:24 },
        '9488': { full_name:'Jaxon Smith-Njigba', position:'WR', team:'SEA', age:24 },
        '11604': { full_name:'Brock Bowers', position:'TE', team:'LV', age:23 },
        '8130': { full_name:'Trey McBride', position:'TE', team:'ARI', age:26 },
        '1466': { full_name:'Travis Kelce', position:'TE', team:'KC', age:36 },
        '3451': { full_name:"Ka'imi Fairbairn", position:'K', team:'HOU', age:32 },
        '11533': { full_name:'Brandon Aubrey', position:'K', team:'DAL', age:31 },
        '4227': { full_name:'Harrison Butker', position:'K', team:'KC', age:30 }
      },
      stats: {
        '4984': { gp:17, pass_yd:3750, pass_td:28, pass_int:6, rush_yd:520, rush_td:12 },
        '11564': { gp:17, pass_yd:3600, pass_td:25, pass_int:10, rush_yd:420, rush_td:4 },
        '4046': { gp:17, pass_yd:4100, pass_td:30, pass_int:11, rush_yd:310, rush_td:2 },
        '9509': { gp:17, rush_yd:1450, rush_td:13, rec:58, rec_yd:520, rec_td:3 },
        '9221': { gp:17, rush_yd:1250, rush_td:12, rec:64, rec_yd:610, rec_td:4 },
        '9226': { gp:16, rush_yd:1050, rush_td:9, rec:62, rec_yd:520, rec_td:5 },
        '7564': { gp:16, rec:108, rec_yd:1480, rec_td:13 },
        '9493': { gp:16, rec:112, rec_yd:1520, rec_td:9 },
        '9488': { gp:17, rec:105, rec_yd:1400, rec_td:10 },
        '11604': { gp:17, rec:96, rec_yd:1120, rec_td:7 },
        '8130': { gp:17, rec:88, rec_yd:960, rec_td:6 },
        '1466': { gp:16, rec:72, rec_yd:780, rec_td:5 },
        '3451': { gp:17, fgm:37, xpm:42 },
        '11533': { gp:17, fgm:36, xpm:46 },
        '4227': { gp:17, fgm:33, xpm:48 }
      },
      marketRows: [
        { sleeper_id:'4984', name:'Josh Allen', position:'QB', value:10600, rank:1, positionRank:1 },
        { sleeper_id:'11564', name:'Drake Maye', position:'QB', value:9202, rank:6, positionRank:2 },
        { sleeper_id:'4046', name:'Patrick Mahomes', position:'QB', value:5934, rank:21, positionRank:7 },
        { sleeper_id:'9509', name:'Bijan Robinson', position:'RB', value:9982, rank:2, positionRank:1 },
        { sleeper_id:'9221', name:'Jahmyr Gibbs', position:'RB', value:9405, rank:5, positionRank:2 },
        { sleeper_id:'9226', name:"De'Von Achane", position:'RB', value:6281, rank:20, positionRank:4 },
        { sleeper_id:'7564', name:"Ja'Marr Chase", position:'WR', value:9728, rank:3, positionRank:1 },
        { sleeper_id:'9493', name:'Puka Nacua', position:'WR', value:8493, rank:7, positionRank:3 },
        { sleeper_id:'9488', name:'Jaxon Smith-Njigba', position:'WR', value:9465, rank:4, positionRank:2 },
        { sleeper_id:'11604', name:'Brock Bowers', position:'TE', value:7440, rank:9, positionRank:1 },
        { sleeper_id:'8130', name:'Trey McBride', position:'TE', value:6959, rank:16, positionRank:2 },
        { sleeper_id:'1466', name:'Travis Kelce', position:'TE', value:1200, rank:190, positionRank:18 }
      ]
    };

    let currentView = 'players';
    let lastResult = null;

    function $(id){ return document.getElementById(id); }
    function setError(msg){ const el=$('error'); el.style.display=msg?'block':'none'; el.textContent=msg||''; }
    function fmt(n){ return n==null||n==='' ? '-' : Number(n).toLocaleString(); }
    function getConfig(){
      return {
        mode:$('mode').value,
        teams:Number($('teams').value)||12,
        ppr:Number($('ppr').value)||0,
        projectionYears:Number($('years').value)||2,
        rosterPositions:$('roster').value.split(',').map(s=>s.trim()).filter(Boolean),
        scoring:JSON.parse($('scoring').value||'{}'),
        draftRounds:4
      };
    }
    function getData(){ return JSON.parse($('dataJson').value||'{}'); }

    function presetSuperflex(){
      $('mode').value='dynasty'; $('teams').value=16; $('ppr').value='0.5'; $('years').value=2;
      $('roster').value='QB,RB,RB,WR,WR,TE,FLEX,SUPER_FLEX,K';
      $('scoring').value=JSON.stringify({pass_td:4,pass_yd:0.04,rush_yd:0.1,rec:0.5,rec_yd:0.1,fgm:3,xpm:1},null,2);
      render();
    }
    function presetRedraft(){
      $('mode').value='redraft'; $('teams').value=12; $('ppr').value='1'; $('years').value=2;
      $('roster').value='QB,RB,RB,WR,WR,TE,FLEX,K';
      $('scoring').value=JSON.stringify({pass_td:4,pass_yd:0.04,rush_yd:0.1,rec:1,rec_yd:0.1,fgm:3,xpm:1},null,2);
      render();
    }
    function presetKicker(){
      $('mode').value='dynasty'; $('teams').value=16; $('ppr').value='0.5'; $('years').value=2;
      $('roster').value='QB,RB,RB,WR,WR,TE,FLEX,SUPER_FLEX,K';
	      $('scoring').value=JSON.stringify({pass_td:4,pass_yd:0.04,rush_yd:0.1,rec:0.5,rec_yd:0.1,fgm:1000,xpm:1},null,2);
      render();
    }

    function setView(view){
      currentView=view;
      ['Players','Picks','Positions'].forEach(name=>$('tab'+name).classList.toggle('active',view===name.toLowerCase()));
      drawTable();
    }

    function render(){
      try{
        setError('');
        const data=getData();
        const config=getConfig();
        lastResult=window.App.DhqCore.calculateValues({
          config,
          players:data.players||{},
          stats:data.stats||{},
          marketRows:data.marketRows||[],
          pickValueFn:window.App.DhqCore.defaultPickValue
        });
        const top=lastResult.playerRows[0];
        $('topAsset').textContent=top?`${top.name} (${top.position})`:'-';
        $('lineupPpg').textContent=fmt(lastResult.lineupContext.perTeamLineupPpg);
        $('kShare').textContent=lastResult.topByPosition.K?`${((lastResult.topByPosition.K.lineupPointShare||0)*100).toFixed(1)}%`:'0%';
        $('rowCount').textContent=String(lastResult.rows.length);
        $('stamp').textContent=lastResult.generatedAt;
        $('configOut').textContent=`${config.mode} | ${config.teams} teams | FC compat ${lastResult.marketCompatibility.score} | ${config.rosterPositions.join(' ')}`;
        drawTable();
      }catch(err){ setError(err.message||String(err)); }
    }

    function drawTable(){
      if(!lastResult)return;
      if(currentView==='positions')return drawPositions();
      const rows=currentView==='picks'?lastResult.pickRows:lastResult.playerRows;
      const cols=currentView==='picks'
        ? ['name','dhq_now','dhq_year_1','dhq_year_2']
        : ['overall_rank','name','position','dhq_now','dhq_year_1','dhq_year_2','ppg','replacement_edge_ppg','player_lineup_point_share','position_lineup_point_share','fc_value','market_weight','position_context','league_starter_pool'];
      const head='<thead><tr>'+cols.map(c=>`<th>${c.replaceAll('_',' ')}</th>`).join('')+'</tr></thead>';
      const body='<tbody>'+rows.slice(0,160).map(r=>'<tr>'+cols.map(c=>{
        const v=r[c];
	        if(c==='position')return `<td class="pos">${v||''}</td>`;
	        if(c.includes('rank'))return `<td class="rank">${v||''}</td>`;
	        if(c==='name')return `<td>${v||''}</td>`;
	        if(c.toLowerCase().includes('share'))return `<td>${v==null||v===''?'-':(Number(v)*100).toFixed(1)+'%'}</td>`;
	        return `<td>${fmt(v)}</td>`;
	      }).join('')+'</tr>').join('')+'</tbody>';
      $('tableWrap').innerHTML='<table>'+head+body+'</table>';
    }

    function drawPositions(){
      const rows=Object.entries(lastResult.topByPosition).map(([pos,d])=>({
        pos,
        starters:lastResult.starterCounts[pos]||0,
        pool:(lastResult.starterCounts[pos]||0)*(lastResult.config.totalTeams||0),
        context:lastResult.positionContext[pos]||0,
        replacement:d.replacement,
        pointShare:d.lineupPointShare,
        marginalShare:d.lineupMarginalShare,
        slotShare:d.lineupSlotShare,
        importance:d.lineupImportance,
        topAvg:d.topAvg,
	        count:d.count
	      }));
	      const cols=['pos','starters','pool','pointShare','marginalShare','slotShare','importance','replacement','topAvg','count'];
      const head='<thead><tr>'+cols.map(c=>`<th>${c}</th>`).join('')+'</tr></thead>';
	      const body='<tbody>'+rows.map(r=>'<tr>'+cols.map(c=>{
	        if(c==='pos')return `<td><span class="pos">${r[c]}</span></td>`;
	        if(c.toLowerCase().includes('share'))return `<td>${(Number(r[c]||0)*100).toFixed(1)}%</td>`;
	        return `<td>${fmt(r[c])}</td>`;
	      }).join('')+'</tr>').join('')+'</tbody>';
      $('tableWrap').innerHTML='<table>'+head+body+'</table>';
    }

    $('dataJson').value=JSON.stringify(sample,null,2);
    presetSuperflex();
  </script>
</body>
</html>

name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # shared/*.js (the 30 engine modules) are gitignored — they're vendored from
      # the neutral C2-Football/dhq-shared repo at build time (npm run build runs
      # sync:shared first). Without this checkout the Vite build can't resolve them.
      - name: Checkout dhq-shared (canonical shared engine)
        uses: actions/checkout@v4
        with:
          repository: C2-Football/dhq-shared
          path: shared-src

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Produce the optimized production bundle (minified + hashed JS chunks,
      # minified CSS, modulepreload graph) instead of shipping raw ES-module
      # source. This cuts the initial-load JS from ~1.79MB across 47 module
      # requests down to ~1.05MB across ~6 hashed chunks, and minifies the
      # 191KB stylesheet.
      - name: Build production bundle (Vite)
        run: SHARED_SOURCE="$GITHUB_WORKSPACE/shared-src" npm run build

      - name: Assemble Pages artifact
        run: |
          set -euo pipefail
          mkdir -p pages-artifact

          # 1. The built app: index.html + hashed assets/* + content/*
          cp -R dist/. pages-artifact/

          # 2. Service worker — registered at runtime as ./sw.js (=> /ReconAI/sw.js).
          #    Vite does not bundle it, so copy it to the artifact root.
          cp sw.js pages-artifact/sw.js

          # 3. PWA icons. Vite does not follow web-manifest icon references, so the
          #    built manifest still points at "icons/*.png". Overlay icons/ at both
          #    paths that get requested at runtime:
          #      - /ReconAI/icons/*         (runtime refs, e.g. notification icon in js/app.js)
          #      - /ReconAI/assets/icons/*  (resolves the built manifest's relative icon src)
          cp -R icons pages-artifact/icons
          mkdir -p pages-artifact/assets/icons
          cp -R icons/. pages-artifact/assets/icons/

          # (Removed) ReconAI used to publish /ReconAI/shared/*.js + /ReconAI/js/pro-launch.js
          # for War Room's old cross-origin loader. War Room now vendors the shared
          # engine itself (from dhq-shared) and self-hosts pro-launch.js, so Scout no
          # longer needs to ship those — its own bundle includes them via Vite.

          touch pages-artifact/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "pages-artifact"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

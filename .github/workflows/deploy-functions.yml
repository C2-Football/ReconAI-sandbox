name: Deploy ReconAI Supabase Edge Functions

on:
  push:
    branches: ["main"]
    paths:
      - "supabase/functions/**"
      - "supabase/migrations/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Verify Supabase deploy token
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "SUPABASE_ACCESS_TOKEN repo secret is required for Edge Function deployment." >&2
            exit 1
          fi

      - uses: supabase/setup-cli@v2.0.0
        with:
          version: latest

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Type check Edge Functions
        run: |
          for fn in supabase/functions/*/index.ts; do
            deno check --node-modules-dir=auto "$fn"
          done

      - name: Verify ReconAI database migrations are recorded
        run: |
          python3 - <<'PYEOF'
          import json, urllib.request, os, sys
          token = os.environ.get('SUPABASE_ACCESS_TOKEN', '')
          expected = {
              '016': 'supabase/migrations/016_analytics_rollups.sql',
              '017': 'supabase/migrations/017_tutorial_state.sql',
              '018': 'supabase/migrations/018_security_identity_hardening.sql',
          }

          for path in expected.values():
              if not os.path.exists(path):
                  print('Migration missing:', path, file=sys.stderr)
                  sys.exit(1)

          quoted_versions = ', '.join(f"'{version}'" for version in expected)
          query = f'select version from supabase_migrations.schema_migrations where version in ({quoted_versions})'
          req = urllib.request.Request(
              'https://api.supabase.com/v1/projects/sxshiqyxhhifvtfqawbq/database/query',
              data=json.dumps({'query': query}).encode(),
              headers={
                  'Authorization': f'Bearer {token}',
                  'Content-Type':  'application/json',
                  'Accept': 'application/json',
                  'User-Agent': 'ReconAI-WarRoom-GitHub-Actions',
              },
              method='POST',
          )
          try:
              with urllib.request.urlopen(req) as r:
                  body = r.read().decode()
          except urllib.error.HTTPError as e:
              body = e.read().decode()
              print('Migration verification response:', e.code, body, file=sys.stderr)
              sys.exit(1)

          try:
              payload = json.loads(body)
          except json.JSONDecodeError:
              print('Migration verification returned non-JSON:', body[:300], file=sys.stderr)
              sys.exit(1)

          found = {str(row.get('version')) for row in payload if isinstance(row, dict)}
          missing = sorted(set(expected) - found)
          if missing:
              print('Migrations not recorded:', ', '.join(missing), file=sys.stderr)
              sys.exit(1)

          print('Recorded migrations:', ', '.join(sorted(found & set(expected))))
          PYEOF

      - name: Deploy espn-proxy function
        run: supabase functions deploy espn-proxy --project-ref sxshiqyxhhifvtfqawbq --use-api --no-verify-jwt

      - name: Deploy mfl-proxy function
        run: supabase functions deploy mfl-proxy --project-ref sxshiqyxhhifvtfqawbq --use-api --no-verify-jwt

      - name: Deploy yahoo-proxy function
        run: supabase functions deploy yahoo-proxy --project-ref sxshiqyxhhifvtfqawbq --use-api --no-verify-jwt
